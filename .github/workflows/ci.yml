name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  architecture:
    name: Architecture Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify service, view, DTO, and read-path boundaries
        shell: pwsh
        run: scripts/verify-code-quality.ps1

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run unit tests
        run: mvn -q test
      - name: Package backend
        run: mvn -q -DskipTests package

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run Testcontainers integration tests
        run: mvn -q -Pintegration verify

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omnimerchant-web
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: omnimerchant-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Run frontend unit tests
        run: npm run test
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  eval:
    name: Deterministic Eval Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run agent and RAG contract tests
        run: >-
          mvn -q
          -Dtest=ToolSelectionScorerTest,AgentOrchestratorServiceTest,AgentExecutionGuardServiceTest,AgentEvalDatasetServiceTest,HybridRagServiceTest,RagSafetyScannerTest,CitationFaithfulnessCheckerTest,RagGovernanceServiceTest
          -Dsurefire.failIfNoSpecifiedTests=false test
      - name: Verify committed deterministic evidence
        shell: pwsh
        run: scripts/verify-evidence.ps1

  browser-smoke:
    name: Browser Smoke (Desktop and Mobile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omnimerchant-web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: omnimerchant-web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  compose:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate docker compose config
        env:
          ADMIN_EMAIL: ci-admin@example.com
          ADMIN_PASSWORD: ci-only-password
          JWT_SECRET: 01234567890123456789012345678901
          INTEGRATION_ENCRYPTION_KEY: 01234567890123456789012345678901
          MYSQL_ROOT_PASSWORD: ci-mysql-root-password
          MYSQL_PASSWORD: ci-mysql-password
          PG_PASSWORD: ci-postgres-password
          OPENAI_API_KEY: ci-placeholder
          ANTHROPIC_API_KEY: ci-placeholder
          DEEPSEEK_API_KEY: ci-placeholder
        run: docker compose -f compose.demo.yml config --quiet
      - name: Verify OpenAPI v4 endpoint contract
        shell: pwsh
        run: scripts/verify-openapi.ps1
