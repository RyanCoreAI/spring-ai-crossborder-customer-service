openapi: 3.0.3
info:
  title: OmniMerchant API
  version: 0.4.0
  description: Spring Boot 4 + Spring AI 2 trustworthy omnichannel ecommerce helpdesk API. This contract lists implemented v4 endpoints only; credential-gated Douyin live APIs remain a release gate.
servers:
  - url: http://localhost:8090
security:
  - bearerAuth: []
paths:
  /api/health:
    get:
      summary: Health check
      security: []
      responses:
        '200': { description: OK }
  /api/system/runtime:
    get:
      summary: Return backend-authoritative runtime mode and demo seed metadata
      responses:
        '200': { description: Runtime mode, demoDataEnabled, and seedVersion }
  /api/admin/login:
    post:
      summary: Admin login
      security: []
      responses:
        '200': { description: JWT response }
  /api/auth/login:
    post:
      summary: Login with a database-backed user account
      security: []
      responses:
        '200': { description: Access token, refresh token, roles, and tenant memberships }
        '401': { description: Invalid credentials }
  /api/auth/refresh:
    post:
      summary: Rotate an access token with a stored refresh token
      security: []
      responses:
        '200': { description: Rotated token pair }
        '401': { description: Invalid, expired, revoked, or reused refresh token }
  /api/auth/logout:
    post:
      summary: Revoke current access and refresh tokens
      responses:
        '200': { description: Logged out }
  /api/auth/me:
    get:
      summary: Get the authenticated database user and memberships
      responses:
        '200': { description: Current identity }
  /api/admin/users:
    get:
      summary: List application users; platform administrator only
      responses:
        '200': { description: User list }
    post:
      summary: Create a user and explicit tenant memberships; platform administrator only
      responses:
        '200': { description: Created user }
  /api/admin/roles:
    get:
      summary: List enforceable RBAC roles and permissions
      responses:
        '200': { description: Role list }
  /api/widget/session:
    post:
      summary: Create public buyer widget session
      security: []
      responses:
        '200': { description: Widget session response with customerSessionToken and expiresAt }
  /api/widget/chat/stream:
    post:
      summary: Public buyer SSE chat
      security:
        - bearerAuth: []
      responses:
        '200': { description: text/event-stream }
        '401': { description: Missing, invalid, or expired customerSessionToken }
        '403': { description: Token tenant or conversation mismatch }
  /api/chat/stream:
    post:
      summary: Authenticated merchant test SSE chat
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: text/event-stream }
        '401': { description: Invalid JWT }
        '403': { description: Tenant membership mismatch }
  /api/customers:
    get:
      summary: List customers
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: keyword, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Customer page }
  /api/orders:
    get:
      summary: List orders
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: keyword, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
      responses:
        '200': { description: Order page }
  /api/orders/by-number/{orderNumber}:
    get:
      summary: Get order by display number
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: orderNumber, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Order detail }
  /api/products:
    get:
      summary: List products
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: keyword, in: query, schema: { type: string } }
        - { name: category, in: query, schema: { type: string } }
      responses:
        '200': { description: Product page }
  /api/products/reindex:
    post:
      summary: Mark products for vector reindex
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Queued count }
  /api/escalations:
    get:
      summary: List escalation tickets
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: status, in: query, schema: { type: integer } }
      responses:
        '200': { description: Escalation page }
    post:
      summary: Create escalation ticket
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Escalation detail }
  /api/escalations/{id}/assign:
    put:
      summary: Assign escalation
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Escalation detail }
  /api/escalations/{id}/resolve:
    put:
      summary: Resolve escalation
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Escalation detail }
  /api/tool-calls:
    get:
      summary: List tool audit records
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Tool-call page }
  /api/dashboard/commerce:
    get:
      summary: Commerce dashboard metrics
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Dashboard metrics }
  /api/channels/summary:
    get:
      summary: Channel implementation and conversation summary for the merchant console
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Channel summary list }
  /api/channels/accounts:
    get:
      summary: Tenant channel account configuration and adapter status
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Channel account list }
  /api/public/channels/wechat-kf/{callbackKey}:
    get:
      summary: Verify and decrypt a WeChat/KF URL challenge by opaque callback key
      security: []
      parameters:
        - { name: callbackKey, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Decrypted challenge }
        '403': { description: Signature, receiveId, or callback key rejected }
    post:
      summary: Verify, decrypt, deduplicate, persist, and enqueue a WeChat/KF callback
      security: []
      parameters:
        - { name: callbackKey, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Fast callback acknowledgement }
        '403': { description: Signature, AES payload, or receiveId rejected }
  /api/channels/messages:
    get:
      summary: List channel message envelopes
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: accountId, in: query, schema: { type: integer, format: int64 } }
        - { name: conversationUuid, in: query, schema: { type: string } }
      responses:
        '200': { description: Channel message page }
  /api/channels/{accountId}/send:
    post:
      summary: Send outbound channel message; fixture only unless live credentials are configured
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: accountId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: ChannelSendResultVO }
  /api/channels/{accountId}/health:
    get:
      summary: Channel adapter health and live/fixture boundary
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: accountId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: ChannelHealthVO }
  /api/channels/accounts/{accountId}/credentials:
    put:
      summary: Encrypt and store WeChat/KF account credentials
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: accountId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Credential readiness without returning secret values }
        '403': { description: Missing integration management permission }
  /api/inbox/queues:
    get:
      summary: Unified helpdesk queue counts
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Inbox queue buckets }
  /api/inbox/items:
    get:
      summary: List unified helpdesk work items from real conversations and tickets
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: queue, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Inbox work item page }
  /api/inbox/{conversationUuid}/context:
    get:
      summary: Load real messages, customer, orders, tickets, approvals, tools, and SLA context for an inbox conversation
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: conversationUuid, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: InboxContextVO }
        '404': { description: Conversation not found in the current tenant }
  /api/tickets:
    get:
      summary: List first-class helpdesk tickets backed by the ticket table
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: status, in: query, schema: { type: string, enum: [OPEN, ASSIGNED, WAITING_CUSTOMER, RESOLVED, CLOSED] } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Ticket page }
  /api/tickets/{id}/assign:
    post:
      summary: Assign a ticket to a human agent and mark it as human assigned
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Updated ticket }
  /api/tickets/{id}/resolve:
    post:
      summary: Resolve a ticket and preserve close reason for QA and operations
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Updated ticket }
  /api/inbox/{conversationUuid}/takeover:
    post:
      summary: Human agent takes over a conversation
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: conversationUuid, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Updated inbox work item }
  /api/inbox/{conversationUuid}/reply:
    post:
      summary: Add a human reply to a conversation and optionally close it
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: conversationUuid, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Updated inbox work item }
  /api/sla/summary:
    get:
      summary: SLA risk summary and risk ticket list
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: SLA summary }
  /api/sla/policies:
    get:
      summary: Tenant SLA policy list including first response and resolution targets
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: SLA policy list }
  /api/macros:
    get:
      summary: Tenant-visible support macros
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Macro list }
  /api/actions:
    get:
      summary: List approval-gated commerce action requests
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: status, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Approval action page }
  /api/actions/policies:
    get:
      summary: Approval policy for high-risk commerce actions
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Commerce action policy list }
  /api/actions/{source}/{id}/approve:
    post:
      summary: Manually approve a high-risk commerce action without executing external writes
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: source, in: path, required: true, schema: { type: string, enum: [return_request, commerce_action_request] } }
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Updated action request }
  /api/actions/{source}/{id}/reject:
    post:
      summary: Reject a high-risk commerce action
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: source, in: path, required: true, schema: { type: string, enum: [return_request, commerce_action_request] } }
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Updated action request }
  /api/qa/queue:
    get:
      summary: List support QA review queue
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: status, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: QA review page }
  /api/qa/summary:
    get:
      summary: Tenant-scoped QA queue totals and persisted score averages
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: QA summary backed by qa_review_queue }
  /api/qa/{id}/review:
    post:
      summary: Submit a human QA review
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Updated QA review item }
  /api/operations/summary:
    get:
      summary: Ecommerce support operations metrics by intent, channel, failure, cost, and takeover
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Operations summary }
  /api/audit/events:
    get:
      summary: Tenant-scoped audit event list for support and approval operations
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Audit event page }
  /api/sre/summary:
    get:
      summary: SLO, alert, backlog, failure, and cost health summary
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: SRE summary }
  /api/sre/policies:
    get:
      summary: Tenant SLO policy targets and alert thresholds
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: SLO policy list }
  /api/sre/snapshots:
    get:
      summary: List persisted SLO evaluation snapshots
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: SLO snapshot list }
  /api/sre/alerts:
    get:
      summary: List persisted alert lifecycle events
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Alert list }
  /api/sre/evaluate:
    post:
      summary: Evaluate current metrics and persist SLO snapshots and alerts
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Current SLO evaluation }
  /api/sre/alerts/{id}/acknowledge:
    post:
      summary: Acknowledge an open alert with the authenticated actor
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Updated alert }
  /api/sre/alerts/{id}/close:
    post:
      summary: Close an alert with the authenticated actor
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Updated alert }
  /api/sre/rollouts:
    get:
      summary: List prompt, model, tool-policy, and RAG index rollout records
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Rollout list with enforcement mode }
    post:
      summary: Register a rollout; unsupported runtime controls remain observe-only
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Created rollout }
  /api/sre/rollouts/{id}/activate:
    post:
      summary: Activate a runtime-enforced RAG index rollout or an observe-only record
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Activated rollout }
  /api/sre/rollouts/{id}/rollback:
    post:
      summary: Roll back a rollout and the active RAG index when applicable
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Rolled back rollout }
  /api/agent/workflow:
    get:
      summary: Supervisor-worker agent workflow and policy boundary summary
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Agent workflow summary }
  /api/agent/plan:
    post:
      summary: Deterministically route a buyer message to a specialist agent and tool allowlist
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Agent routing plan }
  /api/agent/guards:
    get:
      summary: Recent idempotency guard records for agent tool execution
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Agent idempotency guard list }
  /api/security/readiness:
    get:
      summary: Production boundary readiness for security, retention, Shopify, and runbooks
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Production readiness statement backed by backend code and SQL boundaries }
  /api/security/roles:
    get:
      summary: Support role policy matrix for pages, tools, and approval actions
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Role policy list }
  /api/security/retention:
    get:
      summary: Tenant data retention policy for conversations, traces, evals, and audit evidence
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Data retention policy list }
  /api/integrations/shopify/connect:
    post:
      summary: Save encrypted Shopify credentials
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Connection status }
  /api/integrations/shopify/install:
    get:
      summary: Start Shopify OAuth install
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: shop, in: query, required: true, schema: { type: string, example: example.myshopify.com } }
      responses:
        '200': { description: OAuth install URL and state }
        '400': { description: Invalid shop domain }
  /api/integrations/shopify/oauth/callback:
    get:
      summary: Shopify OAuth callback
      security: []
      parameters:
        - { name: shop, in: query, required: true, schema: { type: string } }
        - { name: code, in: query, required: true, schema: { type: string } }
        - { name: state, in: query, required: true, schema: { type: string } }
        - { name: hmac, in: query, required: true, schema: { type: string } }
      responses:
        '200': { description: OAuth token saved and sync jobs created }
        '401': { description: Invalid HMAC or state }
  /api/integrations/shopify/sync:
    post:
      summary: Sync Shopify customers, products, and orders
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Sync summary }
  /api/integrations/shopify/jobs:
    get:
      summary: List Shopify cursor sync jobs
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Sync job page }
  /api/integrations/shopify/jobs/{jobId}/retry:
    post:
      summary: Retry a failed Shopify sync job
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: jobId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Updated job status }
        '404': { description: Job not found }
  /api/integrations/shopify/webhooks:
    get:
      summary: List Shopify webhook processing records
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Webhook event page }
  /api/integrations/shopify/webhooks/{eventId}/replay:
    post:
      summary: Replay a stored Shopify webhook event
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: eventId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Webhook replay result }
        '404': { description: Webhook event not found }
  /api/integrations/shopify/privacy-requests:
    get:
      summary: List persisted Shopify mandatory privacy webhook requests
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Privacy request list }
  /api/integrations/shopify/bulk:
    get:
      summary: List Shopify GraphQL bulk initial-sync operations
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Bulk operation list }
    post:
      summary: Start a read-only Shopify GraphQL bulk operation
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Started bulk operation }
  /api/integrations/shopify/bulk/{id}/refresh:
    post:
      summary: Refresh a Shopify bulk operation status
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Refreshed bulk operation }
  /api/integrations/shopify/bulk/{id}/import:
    post:
      summary: Import the completed read-only bulk result into tenant caches
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Import result }
  /api/webhooks/shopify:
    post:
      summary: Shopify webhook receiver
      security: []
      responses:
        '200': { description: Webhook accepted or rejected with app error code }
  /api/integrations/domestic/platforms:
    get:
      summary: Domestic marketplace connector status; fixture/live boundary is explicit
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: DomesticPlatformVO list }
  /api/integrations/domestic/douyin/fixture-sync:
    post:
      summary: Import Douyin Shop fixture data into real customer/order/product cache tables
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: DomesticFixtureSyncResult }
  /api/integrations/domestic/douyin/fixture-webhook:
    post:
      summary: Process a Douyin Shop fixture webhook without external writes
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: DomesticFixtureSyncResult }
  /api/multilingual/debug:
    post:
      summary: Debug language detection, inbound translation, outbound translation, and fallback status
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: MultilingualDebugVO }
  /api/multilingual/detect:
    post:
      summary: Detect language with real Lingua confidence values and no simulated assistant reply
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Language detection evidence }
  /api/multilingual/summary:
    get:
      summary: Multilingual conversation and translation fallback summary
      parameters:
        - $ref: '#/components/parameters/TenantId'
