        '200': { description: MultilingualSummaryVO }
  /api/multilingual/events:
    get:
      summary: List persisted language detection and translation evidence events
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: MultilingualEventVO page }
  /api/multilingual/traces/{traceId}:
    get:
      summary: Fetch trace detail for language processing evidence
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: traceId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: TraceDetailVO }
  /api/evals:
    get:
      summary: List golden eval cases
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Eval case page }
  /api/evals/run:
    post:
      summary: Run deterministic or opt-in live tenant evals
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Eval run report }
  /api/evals/runs:
    get:
      summary: List persisted eval runs
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Eval run page }
  /api/evals/runs/{runId}:
    get:
      summary: Get eval run detail and case results
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: runId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Eval run detail }
  /api/evals/gold/cases:
    get:
      summary: List manually annotated GOLD eval cases separately from CONTRACT cases
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: GOLD case page }
    post:
      summary: Create a disabled GOLD draft in an existing draft dataset
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: GOLD draft }
  /api/evals/gold/cases/{sourceCaseId}/copy:
    post:
      summary: Copy an existing case into a GOLD draft for human annotation
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: sourceCaseId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: GOLD draft copy }
  /api/evals/gold/cases/{id}/review:
    post:
      summary: Approve or reject a GOLD draft with the authenticated reviewer
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Reviewed GOLD case }
  /api/observability/summary:
    get:
      summary: Tenant-scoped Trust Console summary with eval, RAG, cost, latency, and safety metrics
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
      responses:
        '200': { description: Observability KPI summary }
  /api/observability/failures:
    get:
      summary: Failure attribution buckets
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: category, in: query, schema: { type: string } }
      responses:
        '200': { description: Failure bucket list }
  /api/observability/tools:
    get:
      summary: Tool health metrics with call count, failures, success rate, and P95 latency
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Tool metric list }
  /api/observability/eval-trend:
    get:
      summary: Recent eval trend for pass rate, tool precision, citation, retrieval precision, unsupported claims, and poisoning block
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Eval trend list }
  /api/observability/rag:
    get:
      summary: RAG safety and evidence metrics from recent deterministic eval runs, including recall@k, MRR, nDCG@k, no-answer accuracy, and P95 retrieval latency
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: RAG metric summary }
  /api/rag/query/debug:
    post:
      summary: Debug one tenant-scoped RAG query with rewrite, candidates, fusion, context pack, and evidence level
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question: { type: string }
                intent: { type: string }
                docType: { type: string }
                language: { type: string }
                topK: { type: integer, default: 8 }
      responses:
        '200': { description: RAG debug response }
        '400': { description: Bad request }
  /api/rag/datasets:
    get:
      summary: List CONTRACT and GOLD dataset versions
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Dataset version list }
    post:
      summary: Create a draft dataset version
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Draft dataset }
  /api/rag/datasets/{id}/publish:
    post:
      summary: Publish an immutable reviewed dataset version
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Published dataset }
  /api/rag/feedback:
    get:
      summary: List RAG quality feedback from support reviewers
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Feedback list }
    post:
      summary: Submit citation, retrieval, stale-policy, or answer feedback
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Feedback item }
  /api/rag/feedback/{id}/resolve:
    post:
      summary: Resolve a RAG quality feedback item with reviewer evidence
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Resolved feedback }
  /api/rag/index/releases:
    get:
      summary: List versioned RAG index releases
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Index release list }
    post:
      summary: Create a draft RAG index release
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Draft index release }
  /api/rag/index/releases/{version}/activate:
    post:
      summary: Activate a reviewed RAG index version
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: version, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Active index release }
  /api/rag/index/releases/rollback:
    post:
      summary: Roll back to the previous RAG index release
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: Rolled back index release }
  /api/rag/health:
    get:
      summary: Knowledge health summary for RAG safety, stale docs, indexing failures, and low-evidence evals
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: RAG health summary }
  /api/rag/chunks/{chunkUuid}/neighbors:
    get:
      summary: Get neighboring chunks for context-window inspection
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: chunkUuid, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Neighbor chunk list }
  /api/rag/evals/run:
    post:
      summary: Run the RAG-focused deterministic eval subset
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200': { description: RAG eval run report }
  /api/rag/evals/runs:
    get:
      summary: List persisted eval runs for RAG report navigation
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Eval run page }
  /api/rag/evals/runs/{runId}:
    get:
      summary: Get RAG eval run detail and case results with tool-selection replay fields, reranker mode, retrieval rank, and trace id
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: runId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Eval run detail }
  /api/observability/traces:
    get:
      summary: List agent traces
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: conversationUuid, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [RUNNING, SUCCESS, FAILED] } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Trace page }
  /api/observability/traces/{traceId}:
    get:
      summary: Get trajectory replay details
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: traceId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Trace timeline }
        '404': { description: Trace not found }
  /api/rag/safety/docs:
    get:
      summary: List RAG ingestion safety reviews
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: status, in: query, schema: { type: string, enum: [APPROVED, QUARANTINED, REJECTED] } }
        - { name: riskLevel, in: query, schema: { type: string, enum: [LOW, MEDIUM, HIGH] } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: RAG safety review page }
  /api/rag/safety/docs/{docUuid}/approve:
    post:
      summary: Approve a reviewed document for indexing
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: docUuid, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Updated review }
  /api/rag/safety/docs/{docUuid}/reject:
    post:
      summary: Reject or quarantine a reviewed document
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: docUuid, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Updated review }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: integer
        format: int64
