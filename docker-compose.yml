services:
  mysql:
    image: mysql:8.0
    container_name: omni-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-omni_merchant}
      MYSQL_USER: ${MYSQL_USER:-omnimerchant}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omni-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: omni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE:-omni_merchant}
      POSTGRES_USER: ${PG_USER:-omnimerchant}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnimerchant -d omni_merchant"]
      interval: 10s
      timeout: 5s
      retries: 5

  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: omni-rocketmq-namesrv
    restart: unless-stopped
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: omni-rocketmq-broker
    restart: unless-stopped
    command: sh mqbroker -n rocketmq-namesrv:9876
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"
      NAMESRV_ADDR: "rocketmq-namesrv:9876"
    depends_on:
      - rocketmq-namesrv

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: omni-rocketmq-dashboard
    restart: unless-stopped
    ports:
      - "18080:8080"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    depends_on:
      - rocketmq-namesrv

  app:
    build: .
    container_name: omni-app
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE:-omni_merchant}
      MYSQL_USER: ${MYSQL_USER:-omnimerchant}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      REDIS_HOST: redis
      PG_HOST: postgres
      PG_DATABASE: ${PG_DATABASE:-omni_merchant}
      PG_USER: ${PG_USER:-omnimerchant}
      PG_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      ROCKETMQ_NAMESRV: rocketmq-namesrv:9876
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY:?INTEGRATION_ENCRYPTION_KEY is required}
      SPRING_AI_MODEL_CHAT: ${SPRING_AI_MODEL_CHAT:-none}
      SPRING_AI_MODEL_EMBEDDING: ${SPRING_AI_MODEL_EMBEDDING:-none}
      SPRING_AI_MODEL_AUDIO_SPEECH: ${SPRING_AI_MODEL_AUDIO_SPEECH:-none}
      SPRING_AI_MODEL_AUDIO_TRANSCRIPTION: ${SPRING_AI_MODEL_AUDIO_TRANSCRIPTION:-none}
      SPRING_AI_MODEL_IMAGE: ${SPRING_AI_MODEL_IMAGE:-none}
      SPRING_AI_MODEL_MODERATION: ${SPRING_AI_MODEL_MODERATION:-none}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    build: ./omnimerchant-web
    container_name: omni-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

volumes:
  mysql-data:
  redis-data:
  pg-data:
